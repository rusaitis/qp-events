name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    # mypy has 102 pre-existing errors that the cleanup pass did not
    # tackle; surface the count without gating CI on it. Drop
    # continue-on-error once the count reaches zero.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run mypy src

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run pytest -q --maxfail=5
